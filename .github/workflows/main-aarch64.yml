# CI for native ARM64 Linux build.

name: CI-aarch64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  simple_build_linux_arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Get Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl-dev tk-dev libcairo-dev
      - name: Build
        run: |
          ./configure
          make database/database.h
          make -j$(nproc)

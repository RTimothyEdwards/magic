name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  simple_build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Get Dependencies
        run: |
          sudo apt-get install -y tcl-dev tk-dev libcairo-dev
      - name: Build
        run: |
          ./configure
          make database/database.h
          make -j$(nproc)
